name: Validate Extension

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install zsh for native script validation
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends zsh

      - name: Validate extension
        run: node scripts/validate-extension.mjs

      - name: Test media sync
        run: node tests/media-sync.test.mjs

      - name: Build Chrome package
        run: ./scripts/package-extension.sh
