name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify tag matches manifest
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          test "${GITHUB_REF_NAME}" = "v${manifest_version}"

      - name: Validate extension
        run: node scripts/validate-extension.mjs

      - name: Test media sync
        run: node tests/media-sync.test.mjs

      - name: Build Chrome package
        run: ./scripts/package-extension.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/*.zip --generate-notes --title "Social Post to Obsidian ${GITHUB_REF_NAME}"
