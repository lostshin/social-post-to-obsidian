name: 功能建議
description: 提議符合專案單一用途的改善
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解決的問題
      description: 請先描述使用情境與目前遇到的限制。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建議做法
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考慮過的替代方式
  - type: checkboxes
    id: privacy
    attributes:
      label: 隱私與權限
      options:
        - label: 我已說明此建議是否需要新增 Chrome 權限或處理新的資料類型。
          required: true
