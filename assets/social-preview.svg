<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <clipPath id="popup-clip">
      <rect x="842" y="36" width="360" height="568" rx="18"/>
    </clipPath>
    <filter id="popup-shadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#30273B" flood-opacity="0.18"/>
    </filter>
    <filter id="mark-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#30273B" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#D8D0C7" stroke-width="1" opacity="0.34"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="#F6F3EE"/>
  <rect x="746" width="534" height="640" fill="#F0EBE7"/>
  <rect x="746" width="534" height="640" fill="url(#grid)" opacity="0.44"/>
  <path d="M702 0v640" stroke="#DCD4CB" stroke-width="1"/>

  <circle cx="1150" cy="92" r="236" fill="none" stroke="#6E56B3" stroke-width="1.5" opacity="0.18"/>
  <circle cx="1150" cy="92" r="178" fill="none" stroke="#6E56B3" stroke-width="1" opacity="0.12"/>
  <path d="M695 520C760 455 782 337 760 224" fill="none" stroke="#6E56B3" stroke-width="3" opacity="0.38"/>
  <circle cx="695" cy="520" r="6" fill="#6E56B3"/>

  <g filter="url(#mark-shadow)">
    <rect x="76" y="62" width="76" height="76" rx="19" fill="#25222B"/>
    <path d="M94 77h39a7 7 0 0 1 7 7v21a7 7 0 0 1-7 7h-17l-12 10v-10H94a7 7 0 0 1-7-7V84a7 7 0 0 1 7-7Z" fill="#FFFDF9"/>
    <path d="M114 84v17m-7-7 7 7 7-7" fill="none" stroke="#6E56B3" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g font-family="Avenir Next, Avenir, sans-serif">
    <text x="178" y="91" fill="#6E56B3" font-size="16" font-weight="700" letter-spacing="2.4">OPEN SOURCE · CHROME MV3</text>
    <text x="178" y="119" fill="#77717E" font-size="15" font-weight="500">X 與 Threads 的本機備份工具</text>

    <text x="76" y="244" fill="#25222B" font-size="68" font-weight="750" letter-spacing="-2.8">Social Post</text>
    <text x="76" y="318" fill="#25222B" font-size="68" font-weight="750" letter-spacing="-2.8">to <tspan fill="#6E56B3">Obsidian.</tspan></text>

    <text x="80" y="384" fill="#5E5966" font-size="22" font-weight="500">把發佈過的內容，安靜地留在自己的 Vault。</text>

    <g transform="translate(80 435)">
      <rect width="150" height="36" rx="8" fill="#FFFDF9" stroke="#DCD4CB"/>
      <circle cx="20" cy="18" r="4" fill="#397A5B"/>
      <text x="34" y="23" fill="#47424D" font-size="13" font-weight="650">Local-first</text>
    </g>
    <g transform="translate(242 435)">
      <rect width="174" height="36" rx="8" fill="#FFFDF9" stroke="#DCD4CB"/>
      <circle cx="20" cy="18" r="4" fill="#6E56B3"/>
      <text x="34" y="23" fill="#47424D" font-size="13" font-weight="650">Zero dependencies</text>
    </g>
    <g transform="translate(428 435)">
      <rect width="164" height="36" rx="8" fill="#FFFDF9" stroke="#DCD4CB"/>
      <circle cx="20" cy="18" r="4" fill="#8B672E"/>
      <text x="34" y="23" fill="#47424D" font-size="13" font-weight="650">Draft recovery</text>
    </g>

    <path d="M80 526h480" stroke="#D8D0C7"/>
    <text x="80" y="566" fill="#827C89" font-size="14" font-weight="600" letter-spacing="0.3">github.com/lostshin/social-post-to-obsidian</text>
    <text x="80" y="596" fill="#AAA3AD" font-size="12" font-weight="500">Manifest V3 · Obsidian Local REST API · 本機優先</text>
  </g>

  <g filter="url(#popup-shadow)">
    <rect x="826" y="20" width="392" height="600" rx="28" fill="#25222B" opacity="0.13"/>
    <rect x="830" y="24" width="384" height="592" rx="24" fill="#FFFDF9" stroke="#D6CFC6" stroke-width="2"/>
    <image x="842" y="36" width="360" height="568" preserveAspectRatio="xMidYMid slice" clip-path="url(#popup-clip)" xlink:href="screenshots/popup-activity.png"/>
  </g>
</svg>
